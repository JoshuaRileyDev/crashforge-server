services:
  postgres:
    image: postgres:16
    container_name: crash-reporter-postgres
    environment:
      POSTGRES_DB: crash_reporter
      POSTGRES_USER: crash
      POSTGRES_PASSWORD: crash
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crash -d crash_reporter"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pg-data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crash-reporter-server
    environment:
      PORT: 3000
      DATA_DIR: /app/data
      DATABASE_URL: postgres://crash:crash@postgres:5432/crash_reporter
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_AUTH_HEADER: ${WEBHOOK_AUTH_HEADER:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-data:/app/data

volumes:
  pg-data:
  app-data:

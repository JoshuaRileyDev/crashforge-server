<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CrashForge Login</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #121b2e;
        --panel-2: #1a2540;
        --text: #e7edf9;
        --muted: #95a3bf;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 10% 10%, #1e2a44 0%, var(--bg) 45%);
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(420px, 92vw);
        padding: 18px;
        border-radius: 12px;
        border: 1px solid #2a3a57;
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
      }
      h1 { margin: 0 0 8px; font-size: 22px; }
      p { color: var(--muted); margin: 0 0 14px; font-size: 14px; }
      label { display: grid; gap: 6px; font-size: 13px; }
      input {
        width: 100%;
        border: 1px solid #33517c;
        background: #0f1a2f;
        color: #e8efff;
        border-radius: 8px;
        padding: 10px;
        font-size: 14px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        border: 1px solid #38507f;
        background: #17233d;
        color: #dce8ff;
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
        cursor: pointer;
      }
      .warn { color: #f59e0b; margin-top: 10px; min-height: 18px; font-size: 13px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>CrashForge</h1>
      <p>This dashboard is password protected. Enter your password to continue.</p>
      <form id="loginForm">
        <label>
          Password
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Unlock Dashboard</button>
      </form>
      <div id="message" class="warn"></div>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const message = document.getElementById("message");
      const nextUrl = new URLSearchParams(location.search).get("next") || "/";

      async function checkAlreadyAuthenticated() {
        const status = await fetch("/v1/auth/status").then((r) => r.json()).catch(() => ({}));
        if (status.authenticated) {
          location.replace(nextUrl);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";
        const password = document.getElementById("password").value;

        const response = await fetch("/v1/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          message.textContent = err.error || "Login failed";
          return;
        }

        location.replace(nextUrl);
      });

      checkAlreadyAuthenticated();
    </script>
  </body>
</html>
